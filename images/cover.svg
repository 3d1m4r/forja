<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 540" width="400" height="540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0000;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1A0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#050000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redglow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#660000;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="goldgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#CC0000" flood-opacity="0.4"/>
    </filter>
    <filter id="textshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="540" fill="url(#bg)" rx="6"/>

  <!-- Spine shadow left -->
  <rect x="0" y="0" width="18" height="540" fill="rgba(0,0,0,0.6)" rx="6"/>

  <!-- Decorative background elements -->
  <!-- Abstract brain/forge geometric pattern -->
  <g opacity="0.07" stroke="#CC0000" stroke-width="1" fill="none">
    <circle cx="200" cy="270" r="180"/>
    <circle cx="200" cy="270" r="150"/>
    <circle cx="200" cy="270" r="120"/>
    <line x1="200" y1="90" x2="200" y2="450"/>
    <line x1="20" y1="270" x2="380" y2="270"/>
    <line x1="73" y1="143" x2="327" y2="397"/>
    <line x1="327" y1="143" x2="73" y2="397"/>
  </g>

  <!-- Red fire/forge effect at bottom -->
  <ellipse cx="200" cy="520" rx="180" ry="60" fill="url(#redglow)" opacity="0.5"/>

  <!-- Top accent line gold -->
  <rect x="30" y="38" width="340" height="3" fill="url(#goldgrad)" rx="2"/>

  <!-- Top label -->
  <text x="200" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#D4AF37" letter-spacing="4" opacity="0.9">M É T O D O   D I G I T A L</text>

  <!-- Flame / forge icon area -->
  <g transform="translate(200, 165)" filter="url(#shadow)">
    <!-- Stylized flame/anvil icon -->
    <path d="M0,-55 C-15,-30 -30,-10 -20,20 C-10,45 10,45 20,20 C30,-10 15,-30 0,-55 Z" fill="#CC0000" opacity="0.9"/>
    <path d="M0,-35 C-8,-18 -16,-5 -10,12 C-4,26 4,26 10,12 C16,-5 8,-18 0,-35 Z" fill="#FF6600" opacity="0.8"/>
    <path d="M0,-20 C-4,-10 -8,-2 -4,7 C-1,14 1,14 4,7 C8,-2 4,-10 0,-20 Z" fill="#FFD700" opacity="0.9"/>
    <!-- Anvil base -->
    <rect x="-35" y="45" width="70" height="14" rx="3" fill="#CC0000" opacity="0.7"/>
    <rect x="-25" y="55" width="50" height="20" rx="2" fill="#990000" opacity="0.8"/>
  </g>

  <!-- Main title: FORJA DA -->
  <text x="200" y="250" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="#CC0000" letter-spacing="8" filter="url(#textshadow)" opacity="0.85">F O R J A   D A</text>

  <!-- Main title: MENTE -->
  <text x="200" y="315" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="700" fill="#FFFFFF" letter-spacing="2" filter="url(#textshadow)">MENTE</text>

  <!-- Gold divider line -->
  <rect x="60" y="330" width="280" height="2" fill="url(#goldgrad)" rx="1"/>

  <!-- Subtitle -->
  <text x="200" y="362" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="400" fill="#D4AF37" letter-spacing="1">A Arte de Dominar A Si Mesmo</text>

  <!-- Red accent rectangle -->
  <rect x="30" y="388" width="340" height="80" fill="rgba(204,0,0,0.08)" rx="6" stroke="rgba(204,0,0,0.25)" stroke-width="1"/>

  <!-- Bottom tagline -->
  <text x="200" y="420" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7" letter-spacing="0.5">Domine suas emoções. Controle sua mente.</text>
  <text x="200" y="440" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#FFFFFF" opacity="0.7" letter-spacing="0.5">Conquiste qualquer situação.</text>

  <!-- Includes section -->
  <text x="200" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#4CAF50" letter-spacing="1.5">✔ BÔNUS GRATUITOS INCLUÍDOS</text>

  <!-- Bottom gold line -->
  <rect x="30" y="495" width="340" height="2" fill="url(#goldgrad)" rx="1" opacity="0.5"/>

  <!-- Bottom author area -->
  <text x="200" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#888888" letter-spacing="2">FORJA DA MENTE ©</text>

  <!-- Left spine accent -->
  <rect x="0" y="0" width="6" height="540" fill="#CC0000" rx="3" opacity="0.8"/>
</svg>
